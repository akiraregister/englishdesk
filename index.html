<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Desk｜時事ニュースで学ぶ英語</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="theme-color" content="#1A1F2E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

<!-- Firebase（Googleログイン同期）。HSKアプリと同じプロジェクトを流用可。
     未設定なら自動でローカル保存のみで動作します。 -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- Firebaseの鍵は firebase-config.js に1回だけ置く（index.html を更新しても消えない）。
     無ければ自動でローカル保存のみ。 -->
<script src="firebase-config.js"></script>

<style>
  :root{
    --paper:#FBFAF7; --ink:#1A1F2E; --muted:#6B7280; --line:#E8E4DB;
    --card:#FFFFFF; --amber:#FFE08A; --amber-strong:#EF9F27;
    --accent:#1E5C97; --ok:#059669; --ok-bg:#ECFDF5; --ng:#E11D48; --ng-bg:#FFF1F2;
    --soft-amber:#FEF7E6; --soft-amber-line:#F6E6BE;
    --serif: Georgia, "Times New Roman", "Hiragino Mincho ProN", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{ background:var(--paper); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.5; padding-bottom:env(safe-area-inset-bottom); }
  .wrap{max-width:720px; margin:0 auto; padding:0 16px 48px;}
  .masthead{text-align:center; padding:26px 0 14px;}
  .masthead .kicker{font-size:11px; letter-spacing:.35em; color:var(--muted); text-transform:uppercase; margin:0;}
  .masthead h1{font-family:var(--serif); font-size:40px; font-weight:700; letter-spacing:-.5px; margin:4px 0 0;}
  .nav{display:flex; align-items:center; gap:0; border-bottom:2px solid var(--ink); margin-bottom:6px;}
  .navbtn{position:relative; padding:10px 4px; margin-right:16px; font-weight:700; font-size:14px; color:var(--muted); background:none; white-space:nowrap;}
  .navbtn.on{color:var(--ink);}
  .navbtn.on::after{content:""; position:absolute; left:0; right:0; bottom:-2px; height:3px; background:var(--amber-strong); border-radius:2px;}
  .navbtn .count{display:inline-block; min-width:18px; text-align:center; font-size:11px; font-family:var(--mono);
    background:#ECE7DC; color:#7a8089; border-radius:99px; padding:1px 5px; margin-left:2px;}
  .navbtn.on .count{background:var(--amber); color:#7a5408;}
  .acct{margin-left:auto; font-size:12px; font-weight:600; color:#4b5563; background:#fff; border:1.5px solid var(--line);
    border-radius:99px; padding:5px 12px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .acct:hover{border-color:#9aa3b2;} .acct.local{border:none; color:#9aa3b2; background:none;}
  main{padding-top:8px;}
  .center{text-align:center;} .narrow{max-width:480px; margin:0 auto;} .mid{max-width:560px; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .muted{color:var(--muted);} .mono{font-family:var(--mono);}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:700; border-radius:12px;
    padding:13px 22px; transition:transform .08s, background .15s, border-color .15s;}
  .btn:active{transform:scale(.98);}
  .btn-dark{background:var(--ink); color:#fff;} .btn-dark:hover{background:#33415c;}
  .btn-amber{background:var(--amber-strong); color:#fff;} .btn-amber:hover{filter:brightness(1.05);}
  .btn-ghost{background:#fff; color:#374151; border:2px solid var(--line);} .btn-ghost:hover{border-color:#9aa3b2;}
  .btn:disabled{opacity:.45; cursor:not-allowed; transform:none;}
  .btn-full{width:100%;}
  :focus-visible{outline:2px solid var(--amber-strong); outline-offset:2px;}
  .inp{width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; font-size:15px; font-family:inherit; margin-bottom:8px; background:#fff;}
  .inp:focus{outline:none; border-color:var(--amber-strong);}
  .intro{padding-top:30px;}
  .badge-ic{display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:16px; background:var(--amber); font-size:26px; margin-bottom:18px;}
  .intro h2{font-family:var(--serif); font-size:24px; margin:0;}
  .intro p{color:#4b5563; margin:12px 0 0;}
  .hint{font-size:12px; color:#9aa3b2; margin-top:16px;}
  .resume{margin-top:14px;}
  .qmeta{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px;}
  .bar{height:6px; background:#ECE7DC; border-radius:99px; overflow:hidden; margin-bottom:24px;}
  .bar > i{display:block; height:100%; background:var(--amber-strong); transition:width .3s;}
  .question{font-family:var(--serif); font-size:21px; line-height:1.5; margin:0 0 22px;}
  .opt{width:100%; text-align:left; display:flex; align-items:center; justify-content:space-between; background:#fff;
    border:2px solid var(--line); border-radius:12px; padding:13px 16px; margin-bottom:12px; transition:border-color .15s;}
  .opt:hover{border-color:#9aa3b2;}
  .opt.correct{border-color:var(--ok); background:var(--ok-bg);}
  .opt.wrong{border-color:var(--ng); background:var(--ng-bg);}
  .opt .mk{font-weight:800;} .opt.correct .mk{color:var(--ok);} .opt.wrong .mk{color:var(--ng);}
  .res-kicker{font-size:12px; letter-spacing:.3em; color:var(--muted); text-transform:uppercase;}
  .toeic{font-family:var(--serif); font-size:40px; font-weight:700; margin:10px 0 0; letter-spacing:-1px;}
  .toeic small{font-size:15px; color:var(--muted); font-family:var(--sans); font-weight:400;}
  .levelpill{display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:#fff; padding:7px 18px;
    border-radius:99px; font-family:var(--serif); font-size:19px; font-weight:700; margin-top:8px;}
  .levelpill .gc{color:var(--amber);}
  .rangebar{margin-top:18px;}
  .rangebar .seg{display:flex; height:8px; border-radius:99px; overflow:hidden;}
  .rangebar .seg i{flex:1;}
  .rangebar .ticks{display:flex; justify-content:space-between; font-size:10px; color:#9aa3b2; font-family:var(--mono); margin-top:4px;}
  .blurb{text-align:left; margin-top:16px;}
  .disc{font-size:11px; color:#9aa3b2; margin-top:8px;}
  .seclabel{font-size:14px; font-weight:700; color:#374151; margin:26px 0 12px; text-align:left;}
  .sublabel{font-size:12px; color:#9aa3b2; font-weight:400;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{border:2px solid var(--line); background:#fff; color:#4b5563; border-radius:99px; padding:7px 14px; font-size:14px; transition:.15s;}
  .chip:hover{border-color:#9aa3b2;} .chip.on{border-color:var(--ink); background:var(--ink); color:#fff;}
  .chip.c2{border-style:dashed;}
  .article-meta{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:8px; flex-wrap:wrap;}
  .lv-tag{background:var(--ink); color:#fff; font-family:var(--mono); padding:2px 8px; border-radius:6px;}
  .article h2{font-family:var(--serif); font-size:26px; line-height:1.3; margin:0;}
  .summary{font-size:13px; color:var(--muted); border-left:3px solid var(--amber); padding-left:12px; margin-top:10px;}
  .explain{margin-top:16px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:0 14px;}
  .explain summary{cursor:pointer; list-style:none; padding:12px 0; font-weight:700; font-size:14px; color:#374151; display:flex; align-items:center; gap:6px;}
  .explain summary::-webkit-details-marker{display:none;}
  .explain summary::before{content:"📝";}
  .explain summary::after{content:"＋"; margin-left:auto; color:#9aa3b2; font-weight:700;}
  .explain[open] summary::after{content:"−";}
  .explain .ex-body{padding:0 0 14px; line-height:1.8; color:#374151;}
  .body{font-size:17px; line-height:1.8; margin-top:16px;}
  .body p{margin:0 0 12px;}
  .taphint{font-size:12px; color:#9aa3b2; margin-top:-2px;}
  .tok{border-radius:4px; padding:0 1px; cursor:pointer; transition:background .1s;}
  .tok:hover{background:#EFEADD;}
  .tok-vocab{background:var(--amber); color:var(--ink); padding:0 2px;}
  .tok-vocab:hover{filter:brightness(.96);}
  .readmore{display:inline-flex; align-items:center; gap:4px; font-size:14px; color:var(--accent); text-decoration:none; margin-top:6px;}
  .readmore:hover{text-decoration:underline;}
  .leveltweak{display:flex; align-items:center; gap:8px; margin-top:18px; flex-wrap:wrap;}
  .leveltweak .lab{font-size:12px; color:var(--muted);}
  .tweakbtn{border:1.5px solid var(--line); background:#fff; color:#4b5563; border-radius:8px; padding:5px 12px; font-size:13px; font-weight:600;}
  .tweakbtn:hover{border-color:#9aa3b2;} .tweakbtn:disabled{opacity:.4; cursor:not-allowed;}
  .group-head{display:flex; align-items:center; gap:8px; margin:36px 0 12px;}
  .group-head h3{font-family:var(--serif); font-size:18px; margin:0;} .group-head .num{color:var(--amber-strong);}
  .vcard{margin-bottom:12px;}
  .vcard-head{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .word-line{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .word{font-family:var(--serif); font-size:20px; font-weight:700;}
  .pos{font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:#9aa3b2; border:1px solid var(--line); border-radius:5px; padding:1px 6px;}
  .ipa{font-family:var(--mono); font-size:14px; color:var(--accent); margin-top:4px;}
  .meaning{margin-top:8px;}
  .vcard-actions{display:flex; gap:8px; align-items:center;}
  .speak{flex:none; width:34px; height:34px; border-radius:99px; background:var(--ink); color:#fff; font-size:15px;}
  .speak:hover{background:#33415c;}
  .star{flex:none; width:34px; height:34px; border-radius:99px; border:1.5px solid var(--line); background:#fff; font-size:16px; color:#c9ccd3;}
  .star.on{color:var(--amber-strong); border-color:var(--amber-strong); background:var(--soft-amber);}
  .mini-speak{flex:none; color:#9aa3b2; font-size:14px; line-height:1;} .mini-speak:hover{color:var(--ink);}
  .ex{background:#FAF8F3; border-radius:10px; padding:11px 12px; margin-top:12px;}
  .ex-row{display:flex; align-items:flex-start; gap:8px;}
  .ex-en{font-style:italic; color:#374151; flex:1;}
  .ex-ja{font-size:13px; color:var(--muted); margin-top:4px;}
  .note{font-size:13px; color:#92660a; background:var(--soft-amber); border:1px solid var(--soft-amber-line); border-radius:10px; padding:8px 12px; margin-top:12px;}
  .note b{color:#7a5408;}
  .pattern{display:inline-block; font-family:var(--mono); font-size:13px; color:var(--accent); background:#EAF2FA; border-radius:6px; padding:3px 8px; margin-top:8px;}
  .from-art{background:var(--soft-amber); border:1px solid var(--soft-amber-line); border-radius:10px; padding:10px 12px; margin-top:12px;}
  .from-art .lab{font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:#a06b0a; margin-bottom:3px;}
  .from-art .q{font-style:italic;}
  .gex{display:flex; align-items:flex-start; gap:8px; margin-top:8px;}
  .gex .dot{color:var(--amber-strong); margin-top:2px;} .gex span.t{flex:1; color:#374151;}
  .actions{display:flex; gap:12px; margin-top:36px; flex-wrap:wrap;}
  .actions .btn{flex:1; min-width:160px;}
  .mw-head{font-family:var(--serif); font-size:24px; margin:0 0 14px;}
  .mwitem{margin-bottom:12px;}
  .mwitem.hl1{border-left:4px solid var(--amber-strong);}
  .mwitem.hl2{border-left:4px solid #d9822b;}
  .mwitem.hl3{border-left:4px solid var(--ng);}
  .mw-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .mw-w{font-family:var(--serif); font-size:19px; font-weight:700;}
  .hlbadge{font-size:11px; border-radius:99px; padding:2px 8px; margin-left:6px;}
  .hlpicker{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:12px;}
  .hlpicker-lab{font-size:12px; color:var(--muted); margin-right:2px;}
  .hlchip{border:1.5px solid var(--line); background:#fff; color:#4b5563; border-radius:99px; padding:4px 11px; font-size:13px; font-weight:600; transition:.12s;}
  .hlchip:hover{border-color:#9aa3b2;}
  .hlchip.on{border-color:var(--ink); background:var(--ink); color:#fff;}
  .hlchip.h1.on{background:var(--amber-strong); border-color:var(--amber-strong);}
  .hlchip.h2.on{background:#d9822b; border-color:#d9822b;}
  .hlchip.h3.on{background:var(--ng); border-color:var(--ng);}
  .hlbadge.hl1{background:var(--soft-amber); color:#7a5408;}
  .hlbadge.hl2{background:#FBEAD7; color:#9a5a12;}
  .hlbadge.hl3{background:var(--ng-bg); color:var(--ng);}
  .mw-src{font-size:11px; color:#9aa3b2; margin-top:8px;}
  .mw-actions{display:flex; gap:8px; margin-top:10px;}
  .smallbtn{font-size:13px; border:1.5px solid var(--line); border-radius:8px; padding:5px 10px; background:#fff; color:#4b5563;}
  .smallbtn:hover{border-color:#9aa3b2;} .smallbtn.del:hover{border-color:var(--ng); color:var(--ng);}
  .histitem{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;}
  .histitem .h-main{flex:1; min-width:0;}
  .histitem .h-title{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .histitem .h-meta{font-size:11px; color:#9aa3b2; margin-top:2px;}
  .compbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:28px; padding:12px 16px; border-radius:12px; font-weight:700;}
  .compbar.done{background:var(--ok-bg); color:var(--ok); border:1px solid #bbf7d0;}
  .done-chip{background:var(--ok-bg); color:var(--ok); border:1px solid #bbf7d0; border-radius:6px; padding:2px 8px; font-weight:700;}
  .h-check{color:var(--ok); margin-right:4px;}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none;
    background:var(--ink); color:#fff; font-size:14px; font-weight:600; padding:10px 18px; border-radius:99px; transition:.2s; z-index:50; box-shadow:0 6px 20px rgba(0,0,0,.18);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .wordpop{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(12px); opacity:0; pointer-events:none;
    background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:0 8px 28px rgba(0,0,0,.18);
    padding:14px 16px; z-index:60; min-width:250px; max-width:88vw; transition:.18s;}
  .wordpop.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .wordpop .wp-word{font-family:var(--serif); font-size:21px; font-weight:700;}
  .wordpop .wp-ipa{font-family:var(--mono); font-size:13px; color:var(--accent); margin-top:2px;}
  .wordpop .wp-mean{color:var(--muted); font-size:13px; margin-top:3px;}
  .wordpop .wp-row{display:flex; gap:8px; margin-top:12px;}
  .wordpop .wp-row .btn{flex:1; padding:10px 14px; font-size:14px;}
  @media (max-width:520px){ .masthead h1{font-size:32px;} .article h2{font-size:22px;} .toeic{font-size:34px;} .navbtn{margin-right:12px;} }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <p class="kicker">時事ニュースで学ぶ英語</p>
    <h1>The Desk</h1>
  </header>
  <nav class="nav">
    <button class="navbtn" id="nav-study" data-action="navStudy">学習</button>
    <button class="navbtn" id="nav-mywords" data-action="navMyWords">マイ単語 <span class="count" id="mw-count">0</span></button>
    <button class="navbtn" id="nav-history" data-action="navHistory">履歴 <span class="count" id="hist-count">0</span></button>
    <button class="acct local" id="acct-btn">ローカル保存</button>
  </nav>
  <main id="app"></main>
</div>
<div id="toast" class="toast"></div>
<div id="wordpop" class="wordpop"></div>

/* ===================== ユーティリティ ===================== */
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(c){ return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" })[c]; }); }
function escAttr(s){ return esc(s).replace(/'/g,"&#39;"); }
function speak(text){ try{ var u=new SpeechSynthesisUtterance(text); u.lang="en-US"; u.rate=0.9; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }catch(e){} }
function buildPool(lv, tp){ var all=(DATA&&DATA.lessons&&DATA.lessons[lv])||[]; return tp==="top"?all:all.filter(function(l){return l.topic===tp;}); }
function touchLocal(){ try{ localStorage.setItem(UPD_KEY, String(Date.now())); }catch(e){} schedulePush(); }

var _toastTimer=null;
function toast(msg){ var t=document.getElementById("toast"); if(!t) return; t.textContent=msg; t.classList.add("show"); clearTimeout(_toastTimer); _toastTimer=setTimeout(function(){ t.classList.remove("show"); }, 1600); }

/* ---- マイ単語 ---- */
function loadWords(){ try{ return JSON.parse(localStorage.getItem(MW_KEY)||"[]"); }catch(e){ return []; } }
function saveWords(a){ try{ localStorage.setItem(MW_KEY, JSON.stringify(a)); }catch(e){} }
function isSaved(word){ var w=word.toLowerCase(); return loadWords().some(function(x){ return x.word.toLowerCase()===w; }); }
function addWord(obj){
  var words=loadWords(); var hit=null;
  for(var i=0;i<words.length;i++){ if(words[i].word.toLowerCase()===obj.word.toLowerCase()){ hit=words[i]; break; } }
  if(hit){ if(obj.meaningJa && !hit.meaningJa) hit.meaningJa=obj.meaningJa; if(obj.ipa && !hit.ipa) hit.ipa=obj.ipa; if(obj.exampleEn && !hit.exampleEn) hit.exampleEn=obj.exampleEn; saveWords(words); touchLocal(); return "exists"; }
  words.push({ id:"w_"+Date.now()+"_"+Math.floor(Math.random()*1000), word:obj.word, ipa:obj.ipa||"", meaningJa:obj.meaningJa||"", exampleEn:obj.exampleEn||"", source:obj.source||"", hl:0, addedAt:Date.now() });
  saveWords(words); touchLocal(); return "added";
}
function removeWordByText(word){ var w=word.toLowerCase(); saveWords(loadWords().filter(function(x){ return x.word.toLowerCase()!==w; })); touchLocal(); }
function removeWordById(id){ saveWords(loadWords().filter(function(x){ return x.id!==id; })); touchLocal(); }
function cycleHl(id){ var words=loadWords(); for(var i=0;i<words.length;i++){ if(words[i].id===id){ words[i].hl=((words[i].hl||0)+1)%4; break; } } saveWords(words); touchLocal(); }
function setHlValue(id, hl){ var words=loadWords(); for(var i=0;i<words.length;i++){ if(words[i].id===id){ words[i].hl=hl; break; } } saveWords(words); touchLocal(); }
function setMeaning(id,text){ var words=loadWords(); for(var i=0;i<words.length;i++){ if(words[i].id===id){ words[i].meaningJa=text; break; } } saveWords(words); touchLocal(); }
function updateCount(){ var el=document.getElementById("mw-count"); if(el) el.textContent=loadWords().length; var h=document.getElementById("hist-count"); if(h) h.textContent=loadHistory().length; }

/* ---- 履歴 ---- */
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)||"[]"); }catch(e){ return []; } }
function saveHistory(a){ try{ localStorage.setItem(HIST_KEY, JSON.stringify(a)); }catch(e){} }
function recordHistory(lesson, level){
  if(!lesson || !lesson.article) return;
  var key=level+"|"+lesson.article.headline;
  var hist=loadHistory().filter(function(h){ return h.key!==key; });
  hist.unshift({ key:key, level:level, topic:lesson.topic, headline:lesson.article.headline,
    source:lesson.article.source, when:lesson.article.when, viewedAt:Date.now(), lesson:lesson });
  if(hist.length>40) hist=hist.slice(0,40);
  saveHistory(hist); touchLocal();
}
function clearHistory(){ saveHistory([]); touchLocal(); }

/* ---- 記事の完了状態 ---- */
var DONE_KEY="thedesk-completed-v1";
function loadCompleted(){ try{ return JSON.parse(localStorage.getItem(DONE_KEY)||"{}"); }catch(e){ return {}; } }
function saveCompleted(o){ try{ localStorage.setItem(DONE_KEY, JSON.stringify(o)); }catch(e){} }
function completionKey(lesson, level){ return level+"|"+lesson.article.headline; }
function isCompleted(key){ return !!loadCompleted()[key]; }
function toggleCompleted(lesson, level){
  var o=loadCompleted(); var k=completionKey(lesson, level);
  if(o[k]){ delete o[k]; saveCompleted(o); touchLocal(); return false; }
  o[k]={ at:Date.now(), level:level, headline:lesson.article.headline, topic:lesson.topic };
  saveCompleted(o); touchLocal(); return true;
}
function completedCount(){ return Object.keys(loadCompleted()).length; }
function unionCompleted(a,b){ var o={}; a=a||{}; b=b||{};
  Object.keys(a).forEach(function(k){ o[k]=a[k]; });
  Object.keys(b).forEach(function(k){ if(!o[k] || (b[k].at||0)>(o[k].at||0)) o[k]=b[k]; });
  return o;
}

/* ---- 記憶テスト（マイ単語専用ミニテスト） ---- */
function eligibleWords(){ return loadWords().filter(function(w){ return w.meaningJa && w.meaningJa.trim(); }); }
function adjustHl(id, d){ var ws=loadWords(); for(var i=0;i<ws.length;i++){ if(ws[i].id===id){ var v=(ws[i].hl||0)+d; if(v<0)v=0; if(v>3)v=3; ws[i].hl=v; break; } } saveWords(ws); touchLocal(); }
function buildQuestion(w, pool, dir){
  var answer = dir==="en2ja" ? w.meaningJa : w.word;
  var others=pool.filter(function(x){ return x.id!==w.id; }).sort(function(){ return Math.random()-0.5; });
  var dist=[];
  for(var i=0;i<others.length && dist.length<3;i++){
    var t = dir==="en2ja" ? others[i].meaningJa : others[i].word;
    if(t && t!==answer && dist.indexOf(t)<0) dist.push(t);
  }
  var opts=dist.concat([answer]).sort(function(){ return Math.random()-0.5; });
  return { id:w.id, word:w.word, ipa:w.ipa||"", prompt: dir==="en2ja"?w.word:w.meaningJa, answer:answer, options:opts };
}
function startMemTest(dir){
  var pool=eligibleWords();
  if(pool.length<4){ toast("意味付きの単語が4語以上必要です"); return; }
  var shuffled=pool.slice().sort(function(){ return Math.random()-0.5; });
  var n=Math.min(10, shuffled.length);
  var queue=[];
  for(var i=0;i<n;i++){ queue.push(buildQuestion(shuffled[i], pool, dir)); }
  state.mt={ dir:dir, stage:"quiz", queue:queue, idx:0, score:0, wrong:[], picked:null };
  state.view="memtest"; render();
}
function answerMem(i){
  var mt=state.mt; if(!mt || mt.picked!==null) return;
  var q=mt.queue[mt.idx];
  mt.picked=i;
  var correct = q.options[i]===q.answer;
  if(correct){ mt.score++; adjustHl(q.id,-1); } else { mt.wrong.push(q); adjustHl(q.id,+1); }
  render();
  setTimeout(function(){
    mt.picked=null;
    if(mt.idx+1>=mt.queue.length){ mt.stage="result"; } else { mt.idx++; }
    render();
  }, 700);
}

function tokenize(text, vocabWords){
  var lower=(vocabWords||[]).map(function(w){ return w.toLowerCase(); });
  var parts=String(text).split(/([A-Za-z\u2019']+)/);
  var out="";
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    if(/^[A-Za-z\u2019']+$/.test(p)){
      var cls=lower.indexOf(p.toLowerCase())>=0?"tok tok-vocab":"tok";
      out+='<span class="'+cls+'" data-action="tapWord" data-text="'+escAttr(p)+'">'+esc(p)+'</span>';
    } else { out+=esc(p); }
  }
  return out;
}

function viewTest(){
  var item=TEST[state.qIndex];
  var pct=Math.round((state.qIndex/TEST.length)*100);
  var opts="";
  for(var i=0;i<item.options.length;i++){
    var cls="opt", mk="";
    if(state.picked!==null){
      if(i===item.answer){ cls="opt correct"; mk='<span class="mk">✓</span>'; }
      else if(i===state.picked){ cls="opt wrong"; mk='<span class="mk">✕</span>'; }
    }
    opts+='<button class="'+cls+'" data-action="answer" data-i="'+i+'"><span>'+esc(item.options[i])+'</span>'+mk+'</button>';
  }
  return '<div class="mid" style="padding-top:24px">'
    + '<div class="qmeta"><span class="mono">Q'+(state.qIndex+1)+' / '+TEST.length+'</span><span class="mono">難易度 '+item.pts+'</span></div>'
    + '<div class="bar"><i style="width:'+pct+'%"></i></div>'
    + '<p class="question">'+esc(item.q)+'</p>'+opts+'</div>';
}

function vocabCard(v, src){
  var words=[v.word];
  var ipa=v.ipa?'<div class="ipa">'+esc(v.ipa)+'</div>':"";
  var pos=v.pos?'<span class="pos">'+esc(v.pos)+'</span>':"";
  var ex="";
  if(v.exampleEn){
    var exJa=v.exampleJa?'<div class="ex-ja">'+esc(v.exampleJa)+'</div>':"";
    ex='<div class="ex"><div class="ex-row"><span class="ex-en">'+tokenize(v.exampleEn, words)+'</span><button class="mini-speak" data-action="speak" data-text="'+escAttr(v.exampleEn)+'" aria-label="例文を発音">🔊</button></div>'+exJa+'</div>';
  }
  var note=v.noteJa?'<div class="note"><b>注意</b>　'+esc(v.noteJa)+'</div>':"";
  var saved=isSaved(v.word);
  var starCls=saved?"star on":"star"; var starCh=saved?"★":"☆";
  var star='<button class="'+starCls+'" data-action="bmVocab" data-word="'+escAttr(v.word)+'" data-ipa="'+escAttr(v.ipa||"")+'" data-meaning="'+escAttr(v.meaningJa||"")+'" data-example="'+escAttr(v.exampleEn||"")+'" data-src="'+escAttr(src||"")+'" aria-label="ブックマーク">'+starCh+'</button>';
  return '<div class="card vcard"><div class="vcard-head"><div class="word-line"><span class="word">'+esc(v.word)+'</span>'+pos+'</div>'
    + '<div class="vcard-actions">'+star+'<button class="speak" data-action="speak" data-text="'+escAttr(v.word)+'" aria-label="発音">🔊</button></div></div>'
    + ipa+'<div class="meaning">'+esc(v.meaningJa)+'</div>'+ex+note+'</div>';
}

function grammarCard(g){
  var pattern=g.pattern?'<div><span class="pattern">'+esc(g.pattern)+'</span></div>':"";
  var fromArt=g.fromArticle?'<div class="from-art"><div class="lab">記事の中から</div><div class="q">“'+tokenize(g.fromArticle,[])+'”</div></div>':"";
  var exs="";
  if(g.examplesEn && g.examplesEn.length){
    for(var i=0;i<g.examplesEn.length;i++){
      exs+='<div class="gex"><span class="dot">•</span><span class="t">'+tokenize(g.examplesEn[i],[])+'</span><button class="mini-speak" data-action="speak" data-text="'+escAttr(g.examplesEn[i])+'" aria-label="例文を発音">🔊</button></div>';
    }
  }
  var note=g.noteJa?'<div class="note"><b>注意</b>　'+esc(g.noteJa)+'</div>':"";
  return '<div class="card"><div class="word" style="font-size:18px">'+esc(g.title)+'</div>'+pattern+'<p style="margin:12px 0 0">'+esc(g.explanationJa)+'</p>'+fromArt+exs+note+'</div>';
}

function viewLesson(){
  var lesson=state.pool[state.poolIndex];
  var a=lesson.article;
  var words=lesson.vocabulary.map(function(v){ return v.word; });
  var meta='<span class="lv-tag">'+esc(state.level)+'</span>';
  if(a.source) meta+='<span>'+esc(a.source)+'</span>';
  if(a.when) meta+='<span>· '+esc(a.when)+'</span>';
  var dkey=completionKey(lesson, state.level);
  var done=isCompleted(dkey);
  if(done) meta+='<span class="done-chip">✓ 完了</span>';
  var summary=a.summaryJa?'<p class="summary">'+esc(a.summaryJa)+'</p>':"";
  var paras=(a.paragraphs||[]).map(function(p){ return '<p>'+tokenize(p, words)+'</p>'; }).join("");
  var readmore=a.url?'<a class="readmore" href="'+escAttr(a.url)+'" target="_blank" rel="noreferrer">原文を読む ↗</a>':"";
  var explain=a.explanationJa?'<details class="explain"><summary>日本語解説</summary><div class="ex-body">'+esc(a.explanationJa)+'</div></details>':"";
  var idx=CONTENT_LEVELS.indexOf(state.level);
  var easierDis=idx<=0?" disabled":""; var harderDis=idx>=CONTENT_LEVELS.length-1?" disabled":"";
  var tweak='<div class="leveltweak"><span class="lab">難易度</span>'
    + '<button class="tweakbtn" data-action="easier"'+easierDis+'>← やさしく</button>'
    + '<span class="mono">'+esc(state.level)+'</span>'
    + '<button class="tweakbtn" data-action="harder"'+harderDis+'>難しく →</button></div>';
  var vcards=lesson.vocabulary.map(function(v){ return vocabCard(v, a.headline); }).join("");
  var compBlock=done
    ? '<div class="compbar done"><span>✓ この記事は完了済み</span><button class="smallbtn" data-action="complete">取り消す</button></div>'
    : '<button class="btn btn-amber btn-full" data-action="complete" style="margin-top:28px">✓ 読み終えた（完了）</button>';
  var nextDis="";
  return '<div style="padding-top:16px"><article class="article"><div class="article-meta">'+meta+'</div><h2>'+esc(a.headline)+'</h2>'+summary
    + '<div class="body">'+paras+'</div><p class="taphint">語をタップ→確認してマイ単語に追加・★で見出し語を保存</p>'+readmore+explain+tweak+'</article>'
    + '<div class="group-head">📖 <h3>今日の単語 <span class="num">3</span></h3></div>'+vcards
    + '<div class="group-head">🎓 <h3>今日の文法 <span class="num">1</span></h3></div>'+grammarCard(lesson.grammar)
    + compBlock
    + '<div class="actions"><button class="btn btn-dark" data-action="next"'+nextDis+'>📰 別の記事で続ける</button>'
    + '<button class="btn btn-ghost" data-action="restart">レベル診断に戻る</button></div></div>';
}

function myWordItem(w){

  var SHORT=["なし","⭐","🔶","🔴"];
  var hl=w.hl||0;
  var hlbadge=hl>0?'<span class="hlbadge hl'+hl+'">'+esc(HL[hl])+'</span>':"";
  var ipa=w.ipa?'<div class="ipa">'+esc(w.ipa)+'</div>':"";
  var meaning=w.meaningJa?'<div class="meaning">'+esc(w.meaningJa)+'</div>':'<input class="inp" style="margin-top:8px" data-action="setMeaning" data-id="'+escAttr(w.id)+'" placeholder="意味をメモ（任意）">';
  var ex=w.exampleEn?'<div class="ex"><div class="ex-row"><span class="ex-en">'+esc(w.exampleEn)+'</span><button class="mini-speak" data-action="speak" data-text="'+escAttr(w.exampleEn)+'" aria-label="例文を発音">🔊</button></div></div>':"";
  var src=w.source?'<div class="mw-src">出典：'+esc(w.source)+'</div>':"";
  var picker='<div class="hlpicker"><span class="hlpicker-lab">覚えにくさ</span>';
  for(var k=0;k<SHORT.length;k++){
    var on=k===hl?" on":"";
    picker+='<button class="hlchip h'+k+on+'" data-action="setHl" data-id="'+escAttr(w.id)+'" data-hl="'+k+'">'+esc(SHORT[k])+'</button>';
  }
  picker+='</div>';
  return '<div class="card mwitem hl'+hl+'"><div class="mw-top"><div class="mw-w">'+esc(w.word)+hlbadge+'</div>'
    + '<button class="speak" data-action="speak" data-text="'+escAttr(w.word)+'" aria-label="発音">🔊</button></div>'+ipa+meaning+ex+src
    + picker
    + '<div class="mw-actions"><button class="smallbtn del" data-action="delWord" data-id="'+escAttr(w.id)+'">削除</button></div></div>';
}

}

function viewMemTest(){
  var mt=state.mt; if(!mt) return "";
  if(mt.stage==="result"){
    var n=mt.queue.length;
    var head='<div class="mid center" style="padding-top:24px"><p class="res-kicker">記憶テスト結果</p>'
      + '<p class="toeic">'+mt.score+' <small>/ '+n+'</small></p>';
    var wrong="";
    if(mt.wrong.length){
      wrong='<p class="seclabel">復習する単語</p>';
      for(var i=0;i<mt.wrong.length;i++){ var q=mt.wrong[i];
        wrong+='<div class="card mwitem" style="text-align:left"><div class="mw-top"><div class="mw-w">'+esc(q.word)+'</div>'
          + '<button class="speak" data-action="speak" data-text="'+escAttr(q.word)+'" aria-label="発音">🔊</button></div>'
          + (q.ipa?'<div class="ipa">'+esc(q.ipa)+'</div>':"")+'<div class="meaning">'+esc(q.answer)+'</div></div>';
      }
    } else {
      wrong='<div class="card" style="margin-top:6px">全問正解！🎉</div>';
    }
    return head + wrong
      + '<div class="actions"><button class="btn btn-dark" data-action="memRetry">🧠 もう一度</button>'
      + '<button class="btn btn-ghost" data-action="navMyWords">マイ単語に戻る</button></div></div>';
  }
  var q=mt.queue[mt.idx];
  var pct=Math.round((mt.idx/mt.queue.length)*100);
  var prompt;
  if(mt.dir==="en2ja"){
    prompt='<div class="center" style="margin-bottom:6px"><span class="word" style="font-size:30px">'+esc(q.word)+'</span> '
      + '<button class="mini-speak" data-action="speak" data-text="'+escAttr(q.word)+'" aria-label="発音" style="font-size:18px">🔊</button></div>'
      + (q.ipa?'<p class="center mono" style="color:var(--accent);margin:0 0 4px">'+esc(q.ipa)+'</p>':"")
      + '<p class="center muted" style="margin:0 0 18px">意味は？</p>';
  } else {
    prompt='<p class="question center">'+esc(q.prompt)+'</p><p class="center muted" style="margin:-12px 0 18px">英単語は？</p>';
  }
  var opts="";
  for(var j=0;j<q.options.length;j++){
    var cls="opt", mk="";
    if(mt.picked!==null){
      if(q.options[j]===q.answer){ cls="opt correct"; mk='<span class="mk">✓</span>'; }
      else if(j===mt.picked){ cls="opt wrong"; mk='<span class="mk">✕</span>'; }
    }
    opts+='<button class="'+cls+'" data-action="answerMem" data-i="'+j+'"><span>'+esc(q.options[j])+'</span>'+mk+'</button>';
  }
  return '<div class="mid" style="padding-top:24px">'
    + '<div class="qmeta"><span class="mono">'+(mt.idx+1)+' / '+mt.queue.length+'</span><span class="mono">'+(mt.dir==="en2ja"?"英→日":"日→英")+'</span></div>'
    + '<div class="bar"><i style="width:'+pct+'%"></i></div>'+prompt+opts+'</div>';
}

function viewHistory(){
  var hist=loadHistory();
  if(!hist.length){ return '<div style="padding-top:16px"><h2 class="mw-head">履歴</h2><p class="muted center" style="margin-top:8px">まだ履歴がありません。記事を開くと、ここから読み返せます。</p></div>'; }
  var items="";
  for(var i=0;i<hist.length;i++){
    var h=hist[i];
    var meta=esc(h.level)+(h.source?(" · "+esc(h.source)):"")+(h.when?(" · "+esc(h.when)):"");
    var chk=isCompleted(h.key)?'<span class="h-check">✓</span>':"";
    items+='<div class="card histitem"><div class="h-main"><div class="h-title">'+chk+esc(h.headline)+'</div><div class="h-meta">'+meta+'</div></div>'
      + '<button class="smallbtn" data-action="openHist" data-key="'+escAttr(h.key)+'">開く</button></div>';
  }
  return '<div style="padding-top:16px"><h2 class="mw-head">履歴 <span class="muted" style="font-size:15px;font-weight:400">'+hist.length+'件 · 完了 '+completedCount()+'件</span></h2>'
    + '<div style="text-align:right;margin-bottom:10px"><button class="smallbtn del" data-action="clearHist">すべて消去</button></div>'
    + items+'</div>';
}

/* ===================== アカウント表示 ===================== */
function renderAccount(){
  var btn=document.getElementById("acct-btn"); if(!btn) return;
  if(!FB_READY){ btn.textContent="ローカル保存"; btn.className="acct local"; if(btn.dataset.action) delete btn.dataset.action; return; }
  btn.className="acct";
  if(fbUser){ btn.textContent="✓ "+(fbUser.email?fbUser.email.split("@")[0]:"同期中"); btn.dataset.action="logout"; }
  else { btn.textContent="Googleでログイン"; btn.dataset.action="login"; }
}

/* ===================== 描画 ===================== */
function render(){
  var app=document.getElementById("app");
  var html="";
  if(state.view==="mywords") html=viewMyWords();
  else if(state.view==="memtest") html=viewMemTest();
  else if(state.view==="history") html=viewHistory();
  else if(state.screen==="intro") html=viewIntro();
  else if(state.screen==="test") html=viewTest();
  else if(state.screen==="result") html=viewResult();
  else if(state.screen==="lesson" && state.pool.length) html=viewLesson();
  app.innerHTML=html;
  document.getElementById("nav-study").classList.toggle("on", state.view==="study");
  document.getElementById("nav-mywords").classList.toggle("on", state.view==="mywords" || state.view==="memtest");
  document.getElementById("nav-history").classList.toggle("on", state.view==="history");
  updateCount();
  var key=state.view+"|"+state.screen+"|"+state.poolIndex;
  if(key!==lastView){ window.scrollTo(0,0); lastView=key; }
}

function handleAnswer(i){
  if(state.picked!==null) return;
  state.picked=i; render();
  setTimeout(function(){
    var item=TEST[state.qIndex];
    if(i===item.answer){ state.score++; state.points+=item.pts; }
    state.picked=null;
    if(state.qIndex+1>=TEST.length){
      var toeic=estimateToeic(state.points);
      var band=findBand(toeic);
      state.assess={ toeic:toeic, cefr:band.cefr, label:band.label, blurb:band.blurb, content:band.content };
      state.level=band.content;
      try{ localStorage.setItem(ASSESS_KEY, JSON.stringify(state.assess)); }catch(e){}
      touchLocal();
      state.screen="result";
    } else { state.qIndex++; }
    render();
  }, 550);
}

function showCurrentLesson(){ var l=state.pool[state.poolIndex]; recordHistory(l, state.level); state.view="study"; state.screen="lesson"; render(); }
function openLessons(){ var p=buildPool(state.level, state.topic); if(!p.length) return; state.pool=p; state.poolIndex=0; showCurrentLesson(); }
function changeLevel(dir){
  var idx=CONTENT_LEVELS.indexOf(state.level)+dir;
  if(idx<0||idx>=CONTENT_LEVELS.length) return;
  var lv=CONTENT_LEVELS[idx];
  var p=buildPool(lv, state.topic);
  if(!p.length){ toast(lv+" の記事がありません"); return; }
  state.level=lv; state.pool=p; state.poolIndex=0; showCurrentLesson();
  toast("難易度を "+lv+" に変更");
}

/* ===================== イベント（document 全体で委譲＝ナビも対象） ===================== */
document.body.addEventListener("click", function(e){
  var btn=e.target.closest("[data-action]");
  if(!btn){ if(!e.target.closest("#wordpop")) closeWordPop(); return; }
  var a=btn.dataset.action;
  if(a==="start"){ state.qIndex=0; state.score=0; state.points=0; state.picked=null; state.view="study"; state.screen="test"; render(); }
  else if(a==="resume"){ var s=null; try{ s=JSON.parse(localStorage.getItem(ASSESS_KEY)); }catch(e){} if(s){ state.assess=s; state.level=s.content; state.screen="result"; render(); } }
  else if(a==="answer"){ handleAnswer(parseInt(btn.dataset.i,10)); }
  else if(a==="setTopic"){ state.topic=btn.dataset.topic; render(); }
  else if(a==="setLevel"){ state.level=btn.dataset.level; render(); }
  else if(a==="open"){ openLessons(); }
  else if(a==="easier"){ changeLevel(-1); }
  else if(a==="harder"){ changeLevel(1); }
  else if(a==="next"){ if(state.pool.length>1){ state.poolIndex=(state.poolIndex+1)%state.pool.length; showCurrentLesson(); } else { toast("この条件では他の記事がありません（本番では毎日複数入ります）"); } }
  else if(a==="complete"){ var L=state.pool[state.poolIndex]; var nd=toggleCompleted(L, state.level); toast(nd?"完了しました 🎉":"完了を取り消しました"); render(); }
  else if(a==="restart"){ state.view="study"; state.screen="result"; render(); }
  else if(a==="speak"){ speak(btn.dataset.text); }
  else if(a==="navStudy"){ state.view="study"; render(); }
  else if(a==="navMyWords"){ state.view="mywords"; render(); }
  else if(a==="navHistory"){ state.view="history"; render(); }
  else if(a==="memEn2Ja"){ startMemTest("en2ja"); }
  else if(a==="memJa2En"){ startMemTest("ja2en"); }
  else if(a==="answerMem"){ answerMem(parseInt(btn.dataset.i,10)); }
  else if(a==="memRetry"){ startMemTest(state.mt?state.mt.dir:"en2ja"); }
  else if(a==="openHist"){
    var hist=loadHistory(); var entry=null;
    for(var z=0;z<hist.length;z++){ if(hist[z].key===btn.dataset.key){ entry=hist[z]; break; } }
    if(entry){ state.level=entry.level; state.pool=[entry.lesson]; state.poolIndex=0; showCurrentLesson(); }
  }
  else if(a==="clearHist"){ clearHistory(); render(); toast("履歴を消去しました"); }
  else if(a==="tapWord"){
    var w=btn.dataset.text;
    var lesson=(state.pool.length?state.pool[state.poolIndex]:null);
    var match=null, srcH="";
    if(lesson){ srcH=lesson.article.headline; for(var k=0;k<lesson.vocabulary.length;k++){ if(lesson.vocabulary[k].word.toLowerCase()===w.toLowerCase()){ match=lesson.vocabulary[k]; break; } } }
    var obj=match?{ word:match.word, ipa:match.ipa, meaningJa:match.meaningJa, exampleEn:match.exampleEn, source:srcH }:{ word:w, source:srcH };
    showWordPop(obj);
  }
  else if(a==="confirmAddWord"){
    if(pendingWord){ var pw=pendingWord.word; var r=addWord(pendingWord); toast(r==="exists"?("「"+pw+"」は登録済み"):("「"+pw+"」を追加しました")); updateCount(); }
    closeWordPop();
  }
  else if(a==="closeWordPop"){ closeWordPop(); }
  else if(a==="bmVocab"){
    var word=btn.dataset.word;
    if(isSaved(word)){ removeWordByText(word); btn.textContent="☆"; btn.classList.remove("on"); toast("マイ単語から削除しました"); }
    else { addWord({ word:word, ipa:btn.dataset.ipa, meaningJa:btn.dataset.meaning, exampleEn:btn.dataset.example, source:btn.dataset.src }); btn.textContent="★"; btn.classList.add("on"); toast("マイ単語に追加しました"); }
    updateCount();
  }
  else if(a==="addManual"){
    var wEl=document.getElementById("mw-word"), mEl=document.getElementById("mw-mean"), xEl=document.getElementById("mw-ex");
    var wv=(wEl.value||"").trim();
    if(!wv){ toast("単語を入力してください"); wEl.focus(); return; }
    var r2=addWord({ word:wv, meaningJa:(mEl.value||"").trim(), exampleEn:(xEl.value||"").trim(), source:"手動追加" });
    toast(r2==="exists"?"登録済みです":"追加しました");
    render();
  }
  else if(a==="setHl"){ setHlValue(btn.dataset.id, parseInt(btn.dataset.hl,10)); render(); }
  else if(a==="delWord"){ removeWordById(btn.dataset.id); toast("削除しました"); render(); }
  else if(a==="login"){ fbLogin(); }
  else if(a==="logout"){ fbLogout(); }
});

document.body.addEventListener("change", function(e){
  var el=e.target.closest('[data-action="setMeaning"]');
  if(!el) return;
  setMeaning(el.dataset.id, (el.value||"").trim());
  toast("意味を保存しました");
});

/* ===================== Firebase（Googleログイン同期） ===================== */
var FB_READY=false, fbAuth=null, fbDb=null, fbUser=null;
function fbConfigured(){ return FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf("YOUR_")!==0; }
function fbInit(){
  if(typeof firebase==="undefined" || !fbConfigured()) { renderAccount(); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth=firebase.auth(); fbDb=firebase.firestore(); FB_READY=true;
    fbAuth.onAuthStateChanged(function(u){ fbUser=u; renderAccount(); if(u) cloudSyncOnLogin(); });
    // リダイレクト方式でログインした場合の戻りを処理（エラーは握りつぶす）
    fbAuth.getRedirectResult().catch(function(){});
  }catch(e){ FB_READY=false; }
  renderAccount();
}
function isStandalone(){
  try{
    return window.navigator.standalone===true ||
      (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
  }catch(e){ return false; }
}
function fbLogin(){
  if(!FB_READY) return;
  var provider=new firebase.auth.GoogleAuthProvider();
  // ホーム画面アプリ（standalone）はポップアップが戻らないことがあるので最初からリダイレクト
  if(isStandalone()){
    fbAuth.signInWithRedirect(provider).catch(function(){ toast("ログインに失敗しました"); });
    return;
  }
  fbAuth.signInWithPopup(provider).catch(function(err){
    var code=err && err.code ? err.code : "";
    var useRedirect=["auth/popup-blocked","auth/operation-not-supported-in-this-environment","auth/web-storage-unsupported","auth/internal-error"];
    if(useRedirect.indexOf(code)>=0){
      // ポップアップが使えない環境では自動でリダイレクト方式に切替
      fbAuth.signInWithRedirect(provider).catch(function(){ toast("ログインに失敗しました"); });
    } else if(code==="auth/popup-closed-by-user" || code==="auth/cancelled-popup-request"){
      /* ユーザーが閉じた／連打：何もしない */
    } else {
      toast("ログインに失敗しました");
    }
  });
}
function fbLogout(){ if(fbAuth) fbAuth.signOut().then(function(){ toast("ログアウトしました"); }); }

function localSnapshot(){
  var assess=null; try{ assess=JSON.parse(localStorage.getItem(ASSESS_KEY)); }catch(e){}
  return { assess:assess, words:loadWords(), history:loadHistory(), completed:loadCompleted(), updatedAt:Number(localStorage.getItem(UPD_KEY)||0) };
}
function unionWords(a,b){
  var map={};
  function put(w){ if(!w||!w.word) return; var k=w.word.toLowerCase(); var ex=map[k];
    if(!ex){ map[k]=w; } else {
      map[k]={ id:ex.id||w.id, word:ex.word, ipa:ex.ipa||w.ipa||"", meaningJa:ex.meaningJa||w.meaningJa||"",
        exampleEn:ex.exampleEn||w.exampleEn||"", source:ex.source||w.source||"",
        hl:Math.max(ex.hl||0,w.hl||0), addedAt:Math.max(ex.addedAt||0,w.addedAt||0) };
    }
  }
  (a||[]).forEach(put); (b||[]).forEach(put);
  return Object.keys(map).map(function(k){ return map[k]; });
}
function unionHistory(a,b){
  var map={};
  (a||[]).concat(b||[]).forEach(function(h){ if(!h||!h.key) return; var ex=map[h.key]; if(!ex || (h.viewedAt||0)>(ex.viewedAt||0)) map[h.key]=h; });
  var arr=Object.keys(map).map(function(k){ return map[k]; });
  arr.sort(function(x,y){ return (y.viewedAt||0)-(x.viewedAt||0); });
  return arr.slice(0,40);
}
function cloudSyncOnLogin(){
  if(!FB_READY||!fbUser) return;
  var ref=fbDb.collection("english_thedesk").doc(fbUser.uid);
  ref.get().then(function(doc){
    var cloud=doc.exists?doc.data():null;
    var local=localSnapshot();
    var localEmpty=(!local.assess && local.words.length===0 && local.history.length===0 && Object.keys(local.completed).length===0);
    var cloudHasData=cloud && ((cloud.words&&cloud.words.length)||cloud.assess||(cloud.history&&cloud.history.length)||(cloud.completed&&Object.keys(cloud.completed).length));
    if(localEmpty && cloudHasData){
      if(cloud.assess){ try{ localStorage.setItem(ASSESS_KEY, JSON.stringify(cloud.assess)); }catch(e){} }
      saveWords(cloud.words||[]); saveHistory(cloud.history||[]); saveCompleted(cloud.completed||{});
      try{ localStorage.setItem(UPD_KEY, String(cloud.updatedAt||Date.now())); }catch(e){}
      toast("クラウドから復元しました");
    } else {
      saveWords(unionWords(local.words, cloud?cloud.words:[]));
      saveHistory(unionHistory(local.history, cloud?cloud.history:[]));
      saveCompleted(unionCompleted(local.completed, cloud?cloud.completed:{}));
      var assess=local.assess;
      if(cloud && (cloud.updatedAt||0) > local.updatedAt && cloud.assess) assess=cloud.assess;
      if(assess){ try{ localStorage.setItem(ASSESS_KEY, JSON.stringify(assess)); }catch(e){} }
      try{ localStorage.setItem(UPD_KEY, String(Date.now())); }catch(e){}
      pushCloud();
      toast("同期しました");
    }
    render();
  }).catch(function(){ toast("同期に失敗しました"); });
}
var _pushTimer=null;
function schedulePush(){ if(!FB_READY||!fbUser) return; clearTimeout(_pushTimer); _pushTimer=setTimeout(pushCloud, 800); }
function pushCloud(){
  if(!FB_READY||!fbUser) return;
  var s=localSnapshot();
  fbDb.collection("english_thedesk").doc(fbUser.uid).set({
    assess:s.assess||null, words:s.words, history:s.history, completed:s.completed, updatedAt:Date.now()
  }, {merge:true}).catch(function(){});
}

/* ===================== 起動 ===================== */
function boot(){
  fetch("./data/lessons.json", { cache:"no-store" })
    .then(function(r){ if(!r.ok) throw new Error("no file"); return r.json(); })
    .then(function(json){ DATA=json; render(); })
    .catch(function(){ DATA=FALLBACK; render(); });
}
render();
boot();
fbInit();

if("serviceWorker" in navigator){ window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
</script>
